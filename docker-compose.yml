services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: catasto
      POSTGRES_USER: catasto
      POSTGRES_PASSWORD: catasto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/caves/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy



volumes:
  postgres_data:
